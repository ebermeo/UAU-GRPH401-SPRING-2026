					<div class="card-art"></div>
					<p>Kendrick Lamar</p>
				</div>
				<div class="card card-lg">
					<div class="card-art"></div>

				<div class="card card-md">

					<p>SZA</p>
				</div>
				<div class="card card-md">
					<div class="card-art"></div>
					<p>Post Malone</p>
				</div>
				<div class="card card-md">
					<div class="card-art"></div>
					<p>Doja Cat</p>
				</div>
			</div>
		</section>
		<!-- ROW 3: All Stages (8 cards) -->
		<section class="lineup-section">
			<h2 class="row-label">All Stages</h2>
			<div class="row-3">
				<div class="card card-sm">
					<div class="card-art"></div>
					<p>Mitski</p>
				</div>
				<div class="card card-sm">
					<div class="card-art"></div>
					<p>Clairo</p>
				</div>
				<div class="card card-sm">
					<div class="card-art"></div>
					<p>Vince Staples</p>
				</div>
				<div class="card card-sm">
					<div class="card-art"></div>
					<p>Arca</p>
				</div>
			</div>
		</section>
